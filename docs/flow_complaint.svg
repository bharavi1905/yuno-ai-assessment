<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 920" width="780" height="920">
  <style>text { font-family: system-ui, -apple-system, sans-serif; }</style>
  <defs>
    <marker id="arr"     viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 2 L8 5 L1 8" fill="none" stroke="#555"    stroke-width="1.5" stroke-linecap="round"/></marker>
    <marker id="arr-grn" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 2 L8 5 L1 8" fill="none" stroke="#27ae60" stroke-width="1.5" stroke-linecap="round"/></marker>
    <marker id="arr-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 2 L8 5 L1 8" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/></marker>
    <marker id="arr-pur" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 2 L8 5 L1 8" fill="none" stroke="#6c3483" stroke-width="1.5" stroke-linecap="round"/></marker>
    <marker id="arr-amb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M1 2 L8 5 L1 8" fill="none" stroke="#d68910" stroke-width="1.5" stroke-linecap="round"/></marker>
  </defs>
  <rect width="780" height="920" fill="#fff"/>

  <text x="390" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">Template 2 — Wrong Order / Complaint Resolution</text>
  <text x="390" y="46" text-anchor="middle" font-size="11" fill="#555">LangGraph StateGraph execution flow</text>

  <!-- START -->
  <rect x="215" y="60" width="310" height="34" rx="17" fill="#f2f3f4" stroke="#5d6d7e" stroke-width="1.2"/>
  <text x="370" y="82" text-anchor="middle" font-size="12" font-weight="600" fill="#2c3e50">Telegram complaint / UI trigger</text>
  <line x1="370" y1="94" x2="370" y2="118" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- router_node: x=185 w=370 h=52 y=118 -->
  <rect x="185" y="118" width="370" height="52" rx="8" fill="#f2f3f4" stroke="#5d6d7e" stroke-width="1.2"/>
  <text x="370" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#2c3e50">router_node</text>
  <text x="370" y="158" text-anchor="middle" font-size="10" fill="#5d6d7e">sets workflow_type = complaint_resolution</text>
  <line x1="370" y1="170" x2="370" y2="196" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="390" y="186" font-size="10" fill="#555">complaint_resolution</text>

  <!-- complaint_node: x=100 w=540 h=76 y=196 -->
  <rect x="100" y="196" width="540" height="76" rx="8" fill="#ebf5fb" stroke="#2980b9" stroke-width="1.5"/>
  <text x="370" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#1a4971">complaint_node</text>
  <text x="370" y="236" text-anchor="middle" font-size="10" fill="#2471a3">structured LLM chain · order_lookup MCP tool</text>
  <text x="370" y="252" text-anchor="middle" font-size="10" fill="#2471a3">classifies: wrong_item | quality | late | refund</text>
  <text x="370" y="265" text-anchor="middle" font-size="10" fill="#2471a3">determines resolution: reorder | compensate</text>
  <line x1="370" y1="272" x2="370" y2="298" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- fraud_node: x=100 w=540 h=64 y=298 -->
  <rect x="100" y="298" width="540" height="64" rx="8" fill="#fef9e7" stroke="#b7770d" stroke-width="1.5"/>
  <text x="370" y="320" text-anchor="middle" font-size="12" font-weight="700" fill="#7d6608">fraud_node</text>
  <text x="370" y="338" text-anchor="middle" font-size="10" fill="#9a7d0a">deterministic chain · fraud_scoring MCP tool</text>
  <text x="370" y="354" text-anchor="middle" font-size="10" fill="#9a7d0a">re-validates risk before any resolution action</text>
  <line x1="370" y1="362" x2="370" y2="390" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="388" y="379" font-size="10" fill="#27ae60">approve</text>

  <!-- fraud block → right spine route: x=640,y=330 → x=700,y=330 → down to y=668 → x=640,y=668 -->
  <path d="M 640 330 L 700 330 L 700 668 L 640 668"
        fill="none" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="7 4" marker-end="url(#arr-red)"/>
  <text x="706" y="325" font-size="10" fill="#c0392b">block</text>
  <text x="706" y="339" font-size="10" fill="#c0392b">→ skip</text>

  <!-- hitl_node: x=80 w=560 h=90 y=390 -->
  <rect x="80" y="390" width="560" height="90" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="2"/>
  <text x="360" y="412" text-anchor="middle" font-size="12" font-weight="700" fill="#7b241c">hitl_node — interrupt() ⏸</text>
  <text x="360" y="430" text-anchor="middle" font-size="10" fill="#922b21">bot sends resolution options to Telegram</text>
  <text x="360" y="448" text-anchor="middle" font-size="10" fill="#922b21">Option A: Re-order correct item from same / other restaurant</text>
  <text x="360" y="464" text-anchor="middle" font-size="10" fill="#922b21">Option B: INR credit issued to account — no new order</text>

  <!-- YES reorder → sub-flow (left-down diagonal) -->
  <line x1="280" y1="480" x2="196" y2="520" stroke="#6c3483" stroke-width="1.5" marker-end="url(#arr-pur)"/>
  <text x="188" y="508" text-anchor="end" font-size="10" fill="#6c3483" font-weight="600">YES — reorder</text>

  <!-- Ordering sub-flow box: x=48 w=220 h=90 y=520 -->
  <rect x="48" y="520" width="220" height="90" rx="8" fill="#f5eef8" stroke="#6c3483" stroke-width="1.2" stroke-dasharray="8 4"/>
  <text x="158" y="542" text-anchor="middle" font-size="11" font-weight="700" fill="#4a235a">Ordering sub-flow</text>
  <text x="158" y="560" text-anchor="middle" font-size="10" fill="#6c3483">ordering_node (ReAct)</text>
  <text x="158" y="576" text-anchor="middle" font-size="10" fill="#6c3483">hitl_node (nested confirm)</text>
  <text x="158" y="592" text-anchor="middle" font-size="10" fill="#6c3483">places correct item</text>
  <!-- sub-flow → notification: right then down to y=668 -->
  <path d="M 268 565 L 330 565 L 330 668 L 310 668"
        fill="none" stroke="#6c3483" stroke-width="1.2" marker-end="url(#arr-pur)"/>

  <!-- YES compensate → box (right-down diagonal) -->
  <line x1="460" y1="480" x2="524" y2="520" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arr-grn)"/>
  <text x="526" y="508" font-size="10" fill="#27ae60" font-weight="600">YES — compensate</text>

  <!-- compensate box: x=460 w=190 h=90 y=520 -->
  <rect x="460" y="520" width="190" height="90" rx="6" fill="#e8f8f5" stroke="#0e6655" stroke-width="1.2"/>
  <text x="555" y="543" text-anchor="middle" font-size="11" font-weight="700" fill="#0b5345">compensate</text>
  <text x="555" y="561" text-anchor="middle" font-size="10" fill="#0e6655">issues INR credit</text>
  <text x="555" y="577" text-anchor="middle" font-size="10" fill="#0e6655">to user account</text>
  <text x="555" y="593" text-anchor="middle" font-size="10" fill="#0e6655">no new order placed</text>
  <!-- compensate → notification: down then left -->
  <path d="M 555 610 L 555 668 L 430 668"
        fill="none" stroke="#27ae60" stroke-width="1.2" marker-end="url(#arr-grn)"/>

  <!-- reprompt loop-back: left side
       From x=80,y=435 → x=40,y=435 → x=40,y=234 → x=100,y=234 -->
  <path d="M 80 435 L 40 435 L 40 234 L 100 234"
        fill="none" stroke="#d68910" stroke-width="1.2" stroke-dasharray="8 4" marker-end="url(#arr-amb)"/>
  <text x="36" y="410" text-anchor="middle" font-size="10" fill="#d68910">reprompt</text>
  <text x="36" y="424" text-anchor="middle" font-size="10" fill="#d68910">↺</text>

  <!-- NO / expire → right mini-END -->
  <line x1="640" y1="435" x2="710" y2="435" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arr-red)"/>
  <text x="648" y="428" font-size="10" fill="#c0392b">NO / expire</text>
  <rect x="710" y="418" width="50" height="32" rx="16" fill="#f2f3f4" stroke="#5d6d7e" stroke-width="1"/>
  <text x="735" y="439" text-anchor="middle" font-size="10" font-weight="600" fill="#2c3e50">END</text>

  <!-- notification_node: x=80 w=540 h=64 y=668 -->
  <rect x="80" y="668" width="540" height="64" rx="8" fill="#eaf4d3" stroke="#1e8449" stroke-width="1.5"/>
  <text x="350" y="690" text-anchor="middle" font-size="12" font-weight="700" fill="#196f3d">notification_node</text>
  <text x="350" y="708" text-anchor="middle" font-size="10" fill="#1e8449">deterministic chain · telegram_notify MCP tool</text>
  <text x="350" y="722" text-anchor="middle" font-size="10" fill="#1e8449">sends resolution confirmation or blocked notice</text>

  <line x1="370" y1="732" x2="370" y2="758" stroke="#555" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- END -->
  <rect x="215" y="758" width="310" height="34" rx="17" fill="#f2f3f4" stroke="#5d6d7e" stroke-width="1.2"/>
  <text x="370" y="780" text-anchor="middle" font-size="12" font-weight="600" fill="#2c3e50">END — workflow_status = completed</text>

  <!-- LEGEND -->
  <rect x="30" y="808" width="720" height="96" rx="8" fill="#fafafa" stroke="#ddd" stroke-width="0.8"/>
  <text x="46" y="826" font-size="11" font-weight="700" fill="#333">Resolution path legend</text>
  <text x="46" y="844" font-size="10" fill="#333">reorder — wrong item received: re-searches via nested ordering sub-flow with its own HITL confirmation, places correct item</text>
  <text x="46" y="862" font-size="10" fill="#333">compensate — quality issue / late delivery / refund request: issues INR credit directly, no new order placed</text>
  <text x="46" y="880" font-size="10" fill="#333">reprompt — agent re-analyses complaint with updated context when user provides additional detail</text>
  <text x="46" y="898" font-size="10" fill="#333">block — fraud check fails before resolution: skips hitl_node entirely, sends "request blocked" notification</text>
</svg>
